name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ranjay627/k8s-cicd-demo

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Build Spring Boot app
      - name: Build application
        run: |
          cd app/k8s-demo
          ./mvnw clean package

      # 4. Set dynamic image tag (commit SHA)
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$TAG -f docker/Dockerfile .

      # 7. Push versioned image
      - name: Push Docker image (versioned)
        run: docker push $IMAGE_NAME:$TAG

      # 8. Tag and push latest
      - name: Tag and push latest
        run: |
          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      # 9. Configure AWS using OIDC (NO secrets)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      # 10. Update kubeconfig for EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name k8s-cicd-cluster --region ap-south-1

      # 11. Deploy to EKS
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/k8s-demo \
          k8s-demo=$IMAGE_NAME:$TAG